<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="964" viewBox="0 0 1200 964" role="img" aria-labelledby="title desc">
  <title id="title">Moral Attention Reallocation in Language Models: held-out v11 pilot overview</title>
  <desc id="desc">Held-out v11 pilot summary showing zero parse failures, perfect same-heart control behavior, zero heart overreach, and residual Task B swap-gap concentrated in same-act different-motive pairs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffdf8" />
      <stop offset="100%" stop-color="#f3f7fb" />
    </linearGradient>
  </defs>
  <rect width="1200" height="964" fill="url(#bg)" />
  <text x="56" y="74" font-size="40" font-weight="800" fill="#122033">Moral Attention Reallocation in Language Models</text>
  <text x="56" y="108" font-size="18" fill="#5c6b7c"><tspan x="56" dy="0">Held-out v11 pilot: multi-pass Task B removes same-heart overreach under the heart-focused condition, but swap-gap</tspan><tspan x="56" dy="22">still blocks freeze.</tspan></text>

  
    <rect x="56" y="172" width="250" height="146" rx="18" fill="#f8fafc" stroke="#d7dee8" />
    <text x="80" y="204" font-size="18" font-weight="600" fill="#122033">Valid Pilot Calls</text>
    <text x="80" y="254" font-size="38" font-weight="700" fill="#0f766e">120/120</text>
    <text x="80" y="284" font-size="13" fill="#5c6b7c"><tspan x="80" dy="0">Both Qwen models completed</tspan><tspan x="80" dy="16">every held-out job.</tspan></text>
    
  
    <rect x="326" y="172" width="250" height="146" rx="18" fill="#f8fafc" stroke="#d7dee8" />
    <text x="350" y="204" font-size="18" font-weight="600" fill="#122033">Parse Failure Rate</text>
    <text x="350" y="254" font-size="38" font-weight="700" fill="#0f766e">0.0</text>
    <text x="350" y="284" font-size="13" fill="#5c6b7c"><tspan x="350" dy="0">No JSON or schema failures in</tspan><tspan x="350" dy="16">the held-out run.</tspan></text>
    
  
    <rect x="596" y="172" width="250" height="146" rx="18" fill="#f8fafc" stroke="#d7dee8" />
    <text x="620" y="204" font-size="18" font-weight="600" fill="#122033">Same-Heart Control</text>
    <text x="620" y="254" font-size="38" font-weight="700" fill="#0f766e">1.0</text>
    <text x="620" y="284" font-size="13" fill="#5c6b7c"><tspan x="620" dy="0">All model-condition cells</tspan><tspan x="620" dy="16">preserved Same on controls.</tspan></text>
    
  
    <rect x="866" y="172" width="278" height="146" rx="18" fill="#f8fafc" stroke="#d7dee8" />
    <text x="890" y="204" font-size="18" font-weight="600" fill="#122033">Residual Blocking Metric</text>
    <text x="890" y="254" font-size="38" font-weight="700" fill="#b45309">0.407</text>
    <text x="890" y="284" font-size="13" fill="#5c6b7c"><tspan x="890" dy="0">Task B swap-gap still exceeds the</tspan><tspan x="890" dy="16">study threshold in some cells.</tspan></text>
    

  
    <rect x="56" y="356" width="548" height="452" rx="22" fill="#f8fafc" stroke="#d7dee8" />
