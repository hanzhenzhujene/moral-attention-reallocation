    <text x="84" y="870" font-size="22" font-weight="700" fill="#122033">What held</text>
    <text x="84" y="904" font-size="18" fill="#122033">Zero held-out heart overreach.</text><text x="84" y="932" font-size="18" fill="#122033">Same-heart controls stayed perfect under all conditions.</text>
    
  
    <rect x="604" y="832" width="540" height="108" rx="22" fill="#f8fafc" stroke="#d7dee8" />
