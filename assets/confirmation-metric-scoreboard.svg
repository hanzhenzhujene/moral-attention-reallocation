<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="940" viewBox="0 0 1400 940" role="img" aria-labelledby="title desc">
  <title id="title">Confirmation metric scoreboard</title>
  <desc id="desc">Publication-style metric scoreboard comparing baseline and heart-focused framing on the Qwen-1.5B confirmation slice.</desc>
  <rect width="1400" height="940" fill="#f4f7fb" />
  <text x="54" y="70" font-size="46" font-weight="900" fill="#16253d">Confirmation Metrics At A Glance</text>
  <text x="54" y="108" font-size="22" fill="#617287" font-weight="600">Qwen-1.5B-Instruct · 63-item same-act confirmation slice · baseline vs heart-focused</text>
  <rect x="1048" y="78" width="278" height="30" rx="15" fill="#fff0e0" stroke="#f0d5b3" stroke-width="1" /><text x="1187.0" y="97.5" font-size="13" font-weight="900" fill="#b45309" text-anchor="middle">Public artifact: directional, not definitive</text>

  <rect x="54" y="160" width="412" height="238" rx="22" fill="#ffffff" stroke="#d6deea" stroke-width="1" /><text x="72" y="190" font-size="18" fill="#16253d" font-weight="800"><tspan x="72" dy="0">Task A accuracy</tspan></text><text x="72" y="242" font-size="12" font-weight="800" fill="#617287">Baseline</text><text x="72" y="286" font-size="34" font-weight="900" fill="#16253d">0.5079</text><text x="448" y="242" font-size="12" font-weight="800" fill="#617287" text-anchor="end">Heart-focused</text><text x="448" y="286" font-size="34" font-weight="900" fill="#0f766e" text-anchor="end">0.5079</text><line x1="152" y1="272" x2="368" y2="272" stroke="#d8e0ea" stroke-width="3" /><polygon points="278.0,272 256.0,260 256.0,284" fill="#d8e0ea" /><rect x="72" y="302" width="86" height="30" rx="15" fill="#e9eef6" stroke="#c5d0e0" stroke-width="1" /><text x="115.0" y="321.5" font-size="13" font-weight="800" fill="#16253d" text-anchor="middle">Delta</text><rect x="166" y="302" width="104" height="30" rx="15" fill="#e9eef6" stroke="#c5d0e0" stroke-width="1" /><text x="218.0" y="322.0" font-size="14" font-weight="900" fill="#16253d" text-anchor="middle">+0.0000</text><text x="72" y="348" font-size="13" fill="#617287"><tspan x="72" dy="0">Top-line verdict stayed flat.</tspan></text>
  <rect x="494" y="160" width="412" height="238" rx="22" fill="#ffffff" stroke="#d6deea" stroke-width="1" /><text x="512" y="190" font-size="18" fill="#16253d" font-weight="800"><tspan x="512" dy="0">Task B accuracy</tspan></text><text x="512" y="242" font-size="12" font-weight="800" fill="#617287">Baseline</text><text x="512" y="286" font-size="34" font-weight="900" fill="#16253d">0.8889</text><text x="888" y="242" font-size="12" font-weight="800" fill="#617287" text-anchor="end">Heart-focused</text><text x="888" y="286" font-size="34" font-weight="900" fill="#0f766e" text-anchor="end">0.9524</text><line x1="592" y1="272" x2="808" y2="272" stroke="#d8e0ea" stroke-width="3" /><polygon points="718.0,272 696.0,260 696.0,284" fill="#d8e0ea" /><rect x="512" y="302" width="86" height="30" rx="15" fill="#e9eef6" stroke="#c5d0e0" stroke-width="1" /><text x="555.0" y="321.5" font-size="13" font-weight="800" fill="#16253d" text-anchor="middle">Delta</text><rect x="606" y="302" width="104" height="30" rx="15" fill="#dff3ee" stroke="#bee4da" stroke-width="1" /><text x="658.0" y="322.0" font-size="14" font-weight="900" fill="#0f766e" text-anchor="middle">+0.0635</text><text x="512" y="348" font-size="13" fill="#617287"><tspan x="512" dy="0">Inward-orientation judgment improved.</tspan></text>
  <rect x="934" y="160" width="412" height="238" rx="22" fill="#ffffff" stroke="#d6deea" stroke-width="1" /><text x="952" y="190" font-size="18" fill="#16253d" font-weight="800"><tspan x="952" dy="0">Heart-sensitivity score</tspan></text><text x="952" y="242" font-size="12" font-weight="800" fill="#617287">Baseline</text><text x="952" y="286" font-size="34" font-weight="900" fill="#16253d">0.6957</text><text x="1328" y="242" font-size="12" font-weight="800" fill="#617287" text-anchor="end">Heart-focused</text><text x="1328" y="286" font-size="34" font-weight="900" fill="#0f766e" text-anchor="end">0.8696</text><line x1="1032" y1="272" x2="1248" y2="272" stroke="#d8e0ea" stroke-width="3" /><polygon points="1158.0,272 1136.0,260 1136.0,284" fill="#d8e0ea" /><rect x="952" y="302" width="86" height="30" rx="15" fill="#e9eef6" stroke="#c5d0e0" stroke-width="1" /><text x="995.0" y="321.5" font-size="13" font-weight="800" fill="#16253d" text-anchor="middle">Delta</text><rect x="1046" y="302" width="104" height="30" rx="15" fill="#dff3ee" stroke="#bee4da" stroke-width="1" /><text x="1098.0" y="322.0" font-size="14" font-weight="900" fill="#0f766e" text-anchor="middle">+0.1739</text><text x="952" y="348" font-size="13" fill="#617287"><tspan x="952" dy="0">Core motive-sensitive signal moved in the expected</tspan><tspan x="952" dy="16">direction.</tspan></text>

  <rect x="54" y="430" width="412" height="238" rx="22" fill="#ffffff" stroke="#d6deea" stroke-width="1" /><text x="72" y="460" font-size="18" fill="#16253d" font-weight="800"><tspan x="72" dy="0">P(reason = motive)</tspan></text><text x="72" y="512" font-size="12" font-weight="800" fill="#617287">Baseline</text><text x="72" y="556" font-size="34" font-weight="900" fill="#16253d">0.4127</text><text x="448" y="512" font-size="12" font-weight="800" fill="#617287" text-anchor="end">Heart-focused</text><text x="448" y="556" font-size="34" font-weight="900" fill="#0f766e" text-anchor="end">0.4762</text><line x1="152" y1="542" x2="368" y2="542" stroke="#d8e0ea" stroke-width="3" /><polygon points="278.0,542 256.0,530 256.0,554" fill="#d8e0ea" /><rect x="72" y="572" width="86" height="30" rx="15" fill="#e9eef6" stroke="#c5d0e0" stroke-width="1" /><text x="115.0" y="591.5" font-size="13" font-weight="800" fill="#16253d" text-anchor="middle">Delta</text><rect x="166" y="572" width="104" height="30" rx="15" fill="#dff3ee" stroke="#bee4da" stroke-width="1" /><text x="218.0" y="592.0" font-size="14" font-weight="900" fill="#0f766e" text-anchor="middle">+0.0635</text><text x="72" y="618" font-size="13" fill="#617287"><tspan x="72" dy="0">Reason focus shifted toward motive.</tspan></text>
  <rect x="494" y="430" width="412" height="238" rx="22" fill="#ffffff" stroke="#d6deea" stroke-width="1" /><text x="512" y="460" font-size="18" fill="#16253d" font-weight="800"><tspan x="512" dy="0">Same-heart control accuracy</tspan></text><text x="512" y="512" font-size="12" font-weight="800" fill="#617287">Baseline</text><text x="512" y="556" font-size="34" font-weight="900" fill="#16253d">1.0</text><text x="888" y="512" font-size="12" font-weight="800" fill="#617287" text-anchor="end">Heart-focused</text><text x="888" y="556" font-size="34" font-weight="900" fill="#0f766e" text-anchor="end">1.0</text><line x1="592" y1="542" x2="808" y2="542" stroke="#d8e0ea" stroke-width="3" /><polygon points="718.0,542 696.0,530 696.0,554" fill="#d8e0ea" /><rect x="512" y="572" width="86" height="30" rx="15" fill="#e9eef6" stroke="#c5d0e0" stroke-width="1" /><text x="555.0" y="591.5" font-size="13" font-weight="800" fill="#16253d" text-anchor="middle">Delta</text><rect x="606" y="572" width="104" height="30" rx="15" fill="#e9eef6" stroke="#c5d0e0" stroke-width="1" /><text x="658.0" y="592.0" font-size="14" font-weight="900" fill="#16253d" text-anchor="middle">+0.0</text><text x="512" y="618" font-size="13" fill="#617287"><tspan x="512" dy="0">Guardrail stayed perfect.</tspan></text>
  <rect x="934" y="430" width="412" height="238" rx="22" fill="#ffffff" stroke="#d6deea" stroke-width="1" /><text x="952" y="460" font-size="18" fill="#16253d" font-weight="800"><tspan x="952" dy="0">Heart overreach rate</tspan></text><text x="952" y="512" font-size="12" font-weight="800" fill="#617287">Baseline</text><text x="952" y="556" font-size="34" font-weight="900" fill="#16253d">0.0</text><text x="1328" y="512" font-size="12" font-weight="800" fill="#617287" text-anchor="end">Heart-focused</text><text x="1328" y="556" font-size="34" font-weight="900" fill="#0f766e" text-anchor="end">0.0</text><line x1="1032" y1="542" x2="1248" y2="542" stroke="#d8e0ea" stroke-width="3" /><polygon points="1158.0,542 1136.0,530 1136.0,554" fill="#d8e0ea" /><rect x="952" y="572" width="86" height="30" rx="15" fill="#e9eef6" stroke="#c5d0e0" stroke-width="1" /><text x="995.0" y="591.5" font-size="13" font-weight="800" fill="#16253d" text-anchor="middle">Delta</text><rect x="1046" y="572" width="104" height="30" rx="15" fill="#e9eef6" stroke="#c5d0e0" stroke-width="1" /><text x="1098.0" y="592.0" font-size="14" font-weight="900" fill="#16253d" text-anchor="middle">+0.0</text><text x="952" y="618" font-size="13" fill="#617287"><tspan x="952" dy="0">No false projection of worse hearts.</tspan></text>

  <rect x="54" y="716" width="600" height="168" rx="22" fill="#fffaf3" stroke="#f0d5b3" stroke-width="1" /><rect x="74" y="734" width="210" height="32" rx="16" fill="#fff0e0" stroke="#f0d5b3" stroke-width="1" /><text x="179.0" y="755.0" font-size="14" font-weight="900" fill="#b45309" text-anchor="middle">What this supports</text><text x="76" y="790" font-size="18" fill="#16253d">Motive-sensitive judgment improved on the public slice.</text><text x="76" y="818" font-size="18" fill="#16253d">The gain was not accompanied by same-heart degradation.</text><text x="76" y="846" font-size="18" fill="#16253d">Explanation length also stayed stable.</text>
  <rect x="692" y="716" width="654" height="168" rx="22" fill="#fffaf3" stroke="#f0d5b3" stroke-width="1" /><rect x="712" y="734" width="210" height="32" rx="16" fill="#fff0e0" stroke="#f0d5b3" stroke-width="1" /><text x="817.0" y="755.0" font-size="14" font-weight="900" fill="#b45309" text-anchor="middle">What this does not yet prove</text><text x="714" y="790" font-size="18" fill="#16253d">This is still a pre-freeze confirmation artifact.</text><text x="714" y="818" font-size="18" fill="#16253d">The paired sign test is directional rather than fully decisive.</text><text x="714" y="846" font-size="18" fill="#16253d">The full 160-item main benchmark is not frozen yet.</text>
</svg>
