            <text x="82" y="776" font-size="15" font-weight="700" fill="#122033">Christian</text>
            <rect x="186" y="762" width="320" height="16" rx="8" fill="#e8edf4" />
            <rect x="186" y="762" width="50" height="16" rx="8" fill="#12805c" />
            <text x="524" y="776" font-size="15" fill="#122033" text-anchor="end">0.0789</text>



    <rect x="628" y="338" width="596" height="470" rx="22" fill="#f8fafc" stroke="#d7dee8" />
    <text x="652" y="376" font-size="24" font-weight="800" fill="#122033">Paired Evidence</text>
    <text x="652" y="400" font-size="14" fill="#5c6b7c">This slice holds outward action fixed and varies inward motive.</text>
    <text x="652" y="418" font-size="17" fill="#122033">HSS delta: 0.1739 [0.0435, 0.3478]</text><text x="652" y="448" font-size="17" fill="#122033">Task B delta: 0.1739 [0.0435, 0.3478]</text><text x="652" y="478" font-size="17" fill="#122033">Exact sign counts: 4 better, 0 worse, 19 ties</text><text x="652" y="508" font-size="17" fill="#122033">Exact sign p: one-sided 0.0625, two-sided 0.125</text>
    <line x1="652" y1="544" x2="1200" y2="544" stroke="#d7dee8" />
    <text x="652" y="574" font-size="17" fill="#122033">Bootstrap intervals stay positive for the same-act HSS delta.</text><text x="652" y="602" font-size="17" fill="#122033">Christian framing improves motive-sensitive Task B without extra explanation length.</text><text x="652" y="630" font-size="17" fill="#122033">Christian swap-gap falls to 0.0789; baseline still blocks full freeze.</text>



    <rect x="56" y="840" width="568" height="150" rx="22" fill="#f8fafc" stroke="#d7dee8" />
    <rect x="56" y="840" width="8" height="150" rx="22" fill="#0f766e" />
    <text x="84" y="878" font-size="22" font-weight="800" fill="#122033">What This Supports</text>
    <text x="84" y="912" font-size="16" fill="#122033">A heart-focused Christian frame can improve</text><text x="84" y="936" font-size="16" fill="#122033">inward-orientation judgment before it changes Task A</text><text x="84" y="960" font-size="16" fill="#122033">verdicts.</text><text x="84" y="992" font-size="16" fill="#122033">The gain here is mechanistic: better motive</text><text x="84" y="1016" font-size="16" fill="#122033">discrimination with no guardrail regression.</text>


    <rect x="656" y="840" width="568" height="150" rx="22" fill="#f8fafc" stroke="#d7dee8" />
    <rect x="656" y="840" width="8" height="150" rx="22" fill="#b45309" />
    <text x="684" y="878" font-size="22" font-weight="800" fill="#122033">What Still Needs Work</text>
    <text x="684" y="912" font-size="16" fill="#122033">Baseline still has residual same-act order sensitivity,</text><text x="684" y="936" font-size="16" fill="#122033">so freeze remains blocked.</text><text x="684" y="968" font-size="16" fill="#122033">This slice is strong enough for a paper-quality</text><text x="684" y="992" font-size="16" fill="#122033">directional result, but not yet a final decisive main</text><text x="684" y="1016" font-size="16" fill="#122033">claim.</text>

</svg>
