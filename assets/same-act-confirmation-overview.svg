<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1060" viewBox="0 0 1440 1060" role="img" aria-labelledby="title desc">
  <title id="title">Christian moral attention reallocation overview</title>
  <desc id="desc">Two-panel paper-ready figure showing benchmark logic on the left and the same-act confirmation result summary on the right.</desc>
  <rect width="1440" height="1060" fill="#f4f7fb" />
  <text x="56" y="68" font-size="48" font-weight="900" fill="#15253d">Christian Moral Attention Reallocation</text>
  <text x="56" y="106" font-size="22" fill="#617287" font-weight="600"><tspan x="56" dy="0">Christian heart-focused framing may reallocate moral attention toward inward motive on a clean same-act confirmation</tspan><tspan x="56" dy="26">slice, without increasing same-heart overreach.</tspan></text>
  <rect x="56" y="178" width="648" height="828" rx="26" fill="#ffffff" stroke="#d6deea" stroke-width="1" /><text x="84" y="222" font-size="30" font-weight="800" fill="#15253d">Benchmark Logic</text><text x="84" y="252" font-size="16" fill="#617287"><tspan x="84" dy="0">What is held fixed, what changes, and why the guardrail matters.</tspan></text><rect x="84" y="260" width="592" height="198" rx="22" fill="#fbfdff" stroke="#d6deea" stroke-width="1" /><rect x="104" y="278" width="112" height="28" rx="14" fill="#eef4fb" stroke="#b9c6dd" stroke-width="1" /><text x="160.0" y="296.5" font-size="13" font-weight="800" fill="#15253d" text-anchor="middle">1. Setup</text><text x="232" y="298" font-size="24" font-weight="800" fill="#15253d">Same act, different motive</text><rect x="108" y="306" width="102" height="28" rx="14" fill="#eef3f8" stroke="#b9c6dd" stroke-width="1" /><text x="159.0" y="324.5" font-size="13" font-weight="800" fill="#15253d" text-anchor="middle">Same act</text><rect x="220" y="306" width="128" height="28" rx="14" fill="#eef8f3" stroke="#d3ebdf" stroke-width="1" /><text x="284.0" y="324.5" font-size="13" font-weight="800" fill="#0f766e" text-anchor="middle">Different motive</text><rect x="108" y="330" width="220" height="102" rx="18" fill="#ffffff" stroke="#d6deea" stroke-width="1" /><rect x="122" y="344" width="192" height="26" rx="13" fill="#dfe7f4" stroke="#b9c6dd" stroke-width="1" /><text x="134" y="363" font-size="14" fill="#15253d" font-weight="700"><tspan x="134" dy="0">Help a classmate</tspan></text><text x="124" y="386" font-size="12" font-weight="700" fill="#617287">Motive</text><rect x="122" y="392" width="192" height="30" rx="15" fill="#fff1e7" stroke="#f0d5b3" stroke-width="1" /><text x="134" y="412" font-size="14" fill="#c26a2d" font-weight="700"><tspan x="134" dy="0">to look good</tspan></text><rect x="348" y="330" width="220" height="102" rx="18" fill="#ffffff" stroke="#d6deea" stroke-width="1" /><rect x="362" y="344" width="192" height="2