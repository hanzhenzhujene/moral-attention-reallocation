<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1080" viewBox="0 0 1440 1080" role="img" aria-labelledby="title desc">
  <title id="title">Moral attention reallocation in language models overview</title>
  <desc id="desc">Two-panel figure showing benchmark logic on the left and the confirmation result summary on the right.</desc>
  <rect width="1440" height="1080" fill="#f4f7fb" />
  <text x="56" y="68" font-size="50" font-weight="900" fill="#16253d">Moral Attention Reallocation in Language Models</text>
  <text x="56" y="106" font-size="22" fill="#617287" font-weight="600"><tspan x="56" dy="0">Current confirmation slice: a Christian heart-focused condition may reallocate moral attention toward inward motive</tspan><tspan x="56" dy="26">without increasing same-heart overreach.</tspan></text>

  <rect x="56" y="186" width="648" height="842" rx="26" fill="#ffffff" stroke="#d6deea" stroke-width="1" /><text x="84" y="234" font-size="32" font-weight="800" fill="#16253d">Benchmark Logic</text><text x="84" y="268" font-size="16" fill="#617287"><tspan x="84" dy="0">What is held fixed, what changes, and why the guardrail matters.</tspan></text>
  <rect x="84" y="286" width="592" height="228" rx="22" fill="#fbfdff" stroke="#d6deea" stroke-width="1" /><rect x="104" y="304" width="104" height="28" rx="14" fill="#e9eef6" stroke="#c5d0e0" stroke-width="1" /><text x="156.0" y="322.5" font-size="13" font-weight="800" fill="#16253d" text-anchor="middle">1. Setup</text><text x="228" y="324" font-size="24" font-weight="800" fill="#16253d">Same act, different motive</text><rect x="432" y="338" width="104" height="28" rx="14" fill="#e9eef6" stroke="#c5d0e0" stroke-width="1" /><text x="484.0" y="356.0" font-size="12" font-weight="800" fill="#16253d" text-anchor="middle">Act matched</text><rect x="548" y="338" width="108" height="28" rx="14" fill="#dff3ee" stroke="#bee4da" stroke-width="1" /><text x="602.0" y="356.0" font-size="12" font-weight="800" fill="#0f766e" text-anchor="middle">Motive changed</text><rect x="192" y="374" width="96" height="26" rx="13" fill="#f4f7fb" stroke="#d6deea" stroke-width="1" /><text x="240.0" y="391.0" font-size="12" font-weight="800" fill="#617287" text-anchor="middle">Case A</text><rect x="436" y="374" width="96" height="26" rx="13" fill="#f4f7fb" stroke="#d6deea" stroke-width="1" /><text x="484.0" y="391.0" font-size="12" font-weight="800" fill="#617287" text-anchor="middle">Case B</text><text x="108" y="418" font-size="13" font-weight="800" fill="#617287">Act</text><rect x="192" y="396" width="196" height="36" rx="16" fill="#e9eef6" stroke="#c5d0e0" stroke-width="1" /><text x="206" y="419" font-size="14" fill="#16253d" font-weight="800"><tspan x="206" dy="0">Help a classmate</tspan></text><rect x="436" y="396" width="196" height="36" rx="16" fill="#e9eef6" stroke="#c5d0e0" stroke-width="1" /><text x="450" y="419" font-size="14" fill="#16253d" font-weight="800"><tspan x="450" dy="0">Help a classmate</tspan></text><text x="108" y="468" font-size="13" font-weight="800" fill="#617287">Motive</text><rect x="192" y="446" width="196" height="38" rx="16" fill="#fbe9db" stroke="#f0d1b9" stroke-width="1" /><text x="206" y="470" font-size="14" fill="#b65f1f" font-weight="800"><tspan x="206" dy="0">to look good</tspan></text><rect x="436" y="446" width="196" height="38" rx="16" fill="#dff3ee" stroke="#bee4da" stroke-width="1" /><text x="450" y="470" font-size="14" fill="#0f766e" font-weight="800"><tspan x="450" dy="0">to care</tspan></text><text x="108" y="498" font-size="15" fill="#617287"><tspan x="108" dy="0">Act fixed. Motive shifts.</tspan></text>
  <line x1="380" y1="520" x2="380" y2="534" stroke="#c7d3e2" stroke-width="3" /><polygon points="372,532 388,532 380,548" fill="#c7d3e2" />
  <rect x="84" y="548" width="592" height="176" rx="22" fill="#fbfdff" stroke="#d6deea" stroke-width="1" /><rect x="104" y="566" width="96" height="28" rx="14" fill="#e9eef6" stroke="#c5d0e0" stroke-width="1" /><text x="152.0" y="584.5" font-size="13" font-weight="800" fill="#16253d" text-anchor="middle">2. Test</text><text x="220" y="586" font-size="24" font-weight="800" fill="#16253d">Three tasks, distinct roles</text><rect x="550" y="600" width="106" height="28" rx="14" fill="#dff3ee" stroke="#bee4da" stroke-width="1" /><text x="603.0" y="618.0" font-size="12" font-weight="800" fill="#0f766e" text-anchor="middle">B is key</text><rect x="108" y="626" width="170" height="74" rx="18" fill="#e9eef6" stroke="#d6deea" stroke-width="1" /><text x="124" y="650" font-size="13" font-weight="800" fill="#16253d">Task A</text><text x="124" y="678" font-size="15" fill="#16253d" font-weight="800"><tspan x="124" dy="0">overall wrong?</tspan></text><rect x="291" y="626" width="170" height="74" rx="18" fill="#f7fbfa" stroke="#0f766e" stroke-width="2" /><text x="307" y="650" font-size="13" font-weight="800" fill="#16253d">Task B</text><text x="307" y="678" font-size="15" fill="#16253d" font-weight="800"><tspan x="307" dy="0">worse heart?</tspan></text><rect x="474" y="626" width="170" height="74" rx="18" fill="#e9eef6" stroke="#d6deea" stroke-width="1" /><text x="490" y="650" font-size="13" font-weight="800" fill="#16253d">Task C</text><text x="490" y="678" font-size="15" fill="#16253d" font-weight="800"><tspan x="490" dy="0">why that answer?</tspan></text><text x="108" y="708" font-size="15" fill="#617287"><tspan x="108" dy="0">Task B is the key test.</tspan></text>
  <line x1="380" y1="730" x2="380" y2="746" stroke="#c7d3e2" stroke-width="3" /><polygon points="372,744 388,744 380,760" fill="#c7d3e2" />
  <rect x="84" y="760" width="592" height="236" rx="22" fill="#fbfdff" stroke="#d6deea" stroke-width="1" /><rect x="104" y="778" width="110" height="28" rx="14" fill="#e9eef6" stroke="#c5d0e0" stroke-width="1" /><text x="159.0" y="796.5" font-size="13" font-weight="800" fill="#16253d" text-anchor="middle">3. Guardrail</text><text x="234" y="798" font-size="24" font-weight="800" fill="#16253d">Same-heart control</text><rect x="432" y="812" width="100" height="28" rx="14" fill="#e9eef6" stroke="#c5d0e0" stroke-width="1" /><text x="482.0" y="830.0" font-size="12" font-weight="800" fill="#16253d" text-anchor="middle">Act changed</text><rect x="544" y="812" width="112" height="28" rx="14" fill="#dff3ee" stroke="#bee4da" stroke-width="1" /><text x="600.0" y="830.0" font-size="12" font-weight="800" fill="#0f766e" text-anchor="middle">Heart matched</text><rect x="192" y="848" width="96" height="26" rx="13" fill="#f4f7fb" stroke="#d6deea" stroke-width="1" /><text x="240.0" y="865.0" font-size="12" font-weight="800" fill="#617287" text-anchor="middle">Case A</text><rect x="436" y="848" width="96" height="26" rx="13" fill="#f4f7fb" stroke="#d6deea" stroke-width="1" /><text x="484.0" y="865.0" font-size="12" font-weight="800" fill="#617287" text-anchor="middle">Case B</text><rect x="524" y="848" width="128" height="26" rx="13" fill="#dff3ee" stroke="#bee4da" stroke-width="1" /><text x="588.0" y="865.0" font-size="12" font-weight="900" fill="#0f766e" text-anchor="middle">Task B = Same</text><text x="108" y="892" font-size="13" font-weight="800" fill="#617287">Act</text><rect x="192" y="870" width="196" height="36" rx="16" fill="#e9eef6" stroke="#c5d0e0" stroke-width="1" /><text x="206" y="893" font-size="14" fill="#16253d" font-weight="800"><tspan x="206" dy="0">Gentle correction</tspan></text><rect x="436" y="870" width="196" height="36" rx="16" fill="#e9eef6" stroke="#c5d0e0" stroke-width="1" /><text x="450" y="893" font-size="14" fill="#16253d" font-weight="800"><tspan x="450" dy="0">Blunt correction</tspan></text><text x="108" y="942" font-size="13" font-weight="800" fill="#617287">Motive</text><rect x="192" y="920" width="196" height="38" rx="16" fill="#dff3ee" stroke="#bee4da" stroke-width="1" /><text x="206" y="944" font-size="14" fill="#0f766e" font-weight="800"><tspan x="206" dy="0">to help</tspan></text><rect x="436" y="920" width="196" height="38" rx="16" fill="#dff3ee" stroke="#bee4da" stroke-width="1" /><text x="450" y="944" font-size="14" fill="#0f766e" font-weight="800"><tspan x="450" dy="0">to help</tspan></text><text x="108" y="980" font-size="15" fill="#617287"><tspan x="108" dy="0">Prevents fake wins from over-reading bad hearts.</tspan></text>

  <rect x="736" y="186" width="648" height="842" rx="26" fill="#ffffff" stroke="#d6deea" stroke-width="1" /><text x="764" y="234" font-size="32" font-weight="800" fill="#16253d">Result Summary</text><text x="764" y="268" font-size="16" fill="#617287"><tspan x="764" dy="0">Qwen-1.5B-Instruct · 63-item same-act confirmation slice.</tspan></text>
